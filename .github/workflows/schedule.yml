name: Scheduled Playwright Tests

on:
  schedule:
    - cron: '0 11 * * *' # 11:00 AM UTC
    - cron: '0 18 * * *' # 6:00 PM UTC

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Runs ONLY at 11 AM UTC
      - name: Run 11 AM Tests (@t1)
        if: github.event.schedule == '0 11 * * *'
        run: npx playwright test -g "@t1"

      # Runs ONLY at 6 PM UTC
      - name: Run 6 PM Tests (@t2)
        if: github.event.schedule == '0 18 * * *'
        run: npx playwright test -g "@t2"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14